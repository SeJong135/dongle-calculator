<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요리사 계산기</title>
  <style>
    :root{
      --panel:#1f2937;
      --line:#374151;
      --text:#e5e7eb;
      --accent:#60a5fa;
      --good:#4ade80;
      --bad:#fb7185;
      --input:#0f172a;
      --chip:#111827;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Pretendard,system-ui,sans-serif;background:#0f172a;color:var(--text);padding:14px}
    .wrap{max-width:1180px;margin:auto}
    .card{background:var(--panel);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    h1{margin:0;font-size:28px}
    h2{margin:0 0 10px;font-size:18px;color:#dbeafe}
    .desc{margin-top:8px;font-size:13px;color:#cbd5e1;line-height:1.5}
    .grid{display:grid;gap:10px}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:6px;min-width:0}
    .field label{font-size:13px;color:#bfdbfe}
    .inline-input{display:grid;grid-template-columns:minmax(0,1fr) 110px;gap:6px}
    input,select,button{background:var(--input);border:1px solid var(--line);border-radius:10px;padding:10px;color:white;width:100%;min-width:0}
    button{cursor:pointer}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px}
    .chip{width:auto;padding:9px 12px;background:var(--chip);border:1px solid var(--line);color:#dbeafe}
    .chip.active{background:#1d4ed8;border-color:#60a5fa}
    .mobile-results{display:grid;gap:10px}
    .mini-card{background:#111827;border-radius:12px;padding:10px}
    .mini-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
    .mini-title{font-weight:700}
    .tier-badge{font-size:12px;color:#93c5fd;font-weight:600}
    .plus{color:var(--good)}
    .minus{color:var(--bad)}
    .mini-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
    .stat{background:#1f2937;padding:8px;border-radius:8px;font-size:12px;line-height:1.4}
    .stat.plus{color:var(--good)}
    .stat.minus{color:var(--bad)}
    .sale-box{display:grid;grid-template-columns:minmax(0,1fr) 90px;gap:6px;align-items:center;min-width:220px}
    .sale-box input{padding:8px 10px}
    .sale-hint{font-size:11px;color:#94a3b8}
    textarea{background:var(--input);border:1px solid var(--line);border-radius:10px;padding:10px;color:white;width:100%;min-height:180px;resize:vertical;font-family:inherit}
    .paste-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .paste-actions button{width:auto;padding:8px 14px;border-radius:9px;font-size:13px}
    .primary-btn{background:#1d4ed8;border:1px solid #60a5fa;color:#dbeafe;font-weight:600}
    .secondary-btn{background:#374151;border:1px solid #4b5563;color:#e5e7eb;font-weight:600}
    #discordPaste{max-width:300px;display:block}
    .paste-actions{max-width:300px}
    .discord-apply-notice{max-width:760px;margin-top:10px;display:grid;gap:4px}
    .discord-apply-line{font-size:13px;line-height:1.45}
    .discord-apply-line.main{color:#bfdbfe;font-weight:700}
    .discord-apply-line.sub{color:#facc15;font-weight:600}
    .discord-apply-line.empty{color:#94a3b8;font-weight:500}
    .update-summary{display:grid;gap:8px;margin-top:12px;align-items:start;max-width:760px}
    .update-empty{font-size:13px;color:#94a3b8;margin-top:4px}
    .update-list{display:grid;gap:10px;justify-items:start;max-width:760px;width:100%}
    .update-header{display:grid;grid-template-columns:332px 116px 116px 116px;gap:8px;align-items:end;width:704px;max-width:100%}
    .update-header-spacer{height:1px}
    .update-header-label{font-size:17px;font-weight:800;color:#bfdbfe;white-space:nowrap;text-align:center;display:flex;align-items:center;justify-content:center;height:28px;width:100%}
    .update-item{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
      display:grid;
      grid-template-columns:332px 116px 116px 116px;
      align-items:center;
      gap:8px;
      width:704px;
      max-width:100%;
    }
    .update-item.max{border-left:5px solid #10b981}
    .update-item.m1{border-left:5px solid #84cc16}
    .update-item.m2{border-left:5px solid #eab308}
    .update-item.m3{border-left:5px solid #f59e0b}
    .update-item.m4{border-left:5px solid #fb7185}
    .update-main{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      background:#0b1226;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:12px 16px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }
    .update-item.max .update-main{
      background:rgba(16,185,129,.14);
      border-color:rgba(16,185,129,.42);
    }
    .update-name{
      font-weight:800;
      color:#f8fafc;
      font-size:18px;
      line-height:1.2;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .update-price{
      font-weight:800;
      color:#f8fafc;
      font-size:18px;
      line-height:1.2;
      flex:0 0 auto;
    }
    .update-diff{
      font-weight:900;
      font-size:18px;
      line-height:1.2;
      flex:0 0 auto;
    }
    .update-diff.max{color:#34d399}
    .update-diff.minus{color:#facc15}
    .update-metric{
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b1226;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:12px 10px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      min-width:0;
      text-align:center;
    }
    .update-value{
      font-weight:800;
      text-align:center;
      min-width:0;
      font-size:15px;
      line-height:1.2;
      white-space:nowrap;
    }
    .update-metric .plus{font-weight:900}
    .update-metric .minus{font-weight:900}
    .update-mobile-stats{display:none}
    .recipe-grid{display:grid;gap:10px}
    .recipe{background:#111827;border-radius:10px;padding:10px}
    .recipe-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:15px;color:#dbeafe;font-weight:700}
    .recipe-row{display:grid;grid-template-columns:minmax(0,1fr) 84px;gap:10px;font-size:13px;margin:4px 0;color:#d1d5db;max-width:460px}
    .recipe-total{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.12);display:grid;grid-template-columns:minmax(0,1fr) 84px;gap:10px;font-size:13px;font-weight:700;max-width:460px}
    .muted{color:#9ca3af}
    .recipe-row span:last-child,.recipe-total span:last-child{text-align:right}

    .detail-btn{
      margin-top:8px;
      background:#1d4ed8;
      border:1px solid #60a5fa;
      color:#dbeafe;
      font-size:12px;
      font-weight:600;
      padding:8px 12px;
      border-radius:8px;
      width:auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      align-self:flex-start;
    }
    .detail-btn:hover{
      background:#2563eb;
    }
    .inline-detail{
      margin-top:10px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:10px;
      padding:10px;
    }
    .inline-detail .recipe-row{
      margin:6px 0;
    }
    .inline-detail .recipe-total{
      margin-top:8px;
    }
    .hidden-front{
      display:none !important;
    }
    @media (min-width:781px){.recipe-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (min-width:900px){
      .update-item,.update-header{grid-template-columns:332px 116px 116px 116px;max-width:704px;width:704px}
    }
    @media (max-width:780px){
      body{padding:10px}
      .grid.cols-4{grid-template-columns:1fr}
      .inline-input{grid-template-columns:minmax(0,1fr) 100px}
      .mini-grid{grid-template-columns:1fr 1fr}
      .recipe-head,.mini-head{flex-direction:column}
      .sale-box{grid-template-columns:minmax(0,1fr) 80px;min-width:0;width:100%}
      .detail-btn{width:100%;display:flex}
      .recipe-row,.recipe-total{max-width:none;grid-template-columns:minmax(0,1fr) 72px}
      #discordPaste,.paste-actions,.update-summary,.update-list,.discord-apply-notice{max-width:none;width:100%}
      .update-item{
        grid-template-columns:1fr;
        align-items:flex-start;
        gap:8px;
        width:100%;
      }
      .update-main{
        white-space:normal;
        flex-wrap:wrap;
        gap:8px;
      }
      .update-name,.update-price,.update-diff{font-size:17px}
      .update-header{display:none}
      .update-item{
        grid-template-columns:1fr;
        align-items:flex-start;
        gap:8px;
        width:100%;
      }
      .update-metric{display:none}
      .update-mobile-stats{
        display:grid;
        grid-template-columns:repeat(3,minmax(0,1fr));
        gap:8px;
        width:100%;
        background:#0b1226;
        border:1px solid rgba(255,255,255,.06);
        border-radius:14px;
        padding:10px 12px;
        box-shadow:0 8px 20px rgba(0,0,0,.18);
      }
      .update-mobile-col{display:grid;gap:4px;text-align:center;min-width:0}
      .update-mobile-label{font-size:12px;color:#cbd5e1;font-weight:700;white-space:nowrap}
      .update-mobile-value{font-size:15px;font-weight:900;white-space:nowrap}
      .update-value{text-align:center;font-size:14px}
      .paste-actions button{width:auto}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>요리사 계산기</h1>
    <div class="desc">판매가는 각 음식 최대 상점가, 직접 수정 가능</div>
  </div>

  <div class="card">
    <h2>생활강화</h2>
    <div class="grid cols-4">
      <div class="field">
        <label for="bonusRate">추가 생산률</label>
        <select id="bonusRate">
          <option value="0">0%</option>
          <option value="0.03">3%</option>
          <option value="0.06">6%</option>
          <option value="0.09">9%</option>
          <option value="0.12">12%</option>
          <option value="0.20">20%</option>
        </select>
      </div>
    </div>
    <div class="desc">제작 기대수량 증가 -> 최종 원가 계산에만 반영</div>
  </div>

  <div class="card">
    <h2>재료 시세</h2>
    <div class="grid cols-4" id="priceGrid"></div>
  </div>

  <div class="card">
    <h2>디코에서 변동가를 붙여 넣어주세요!</h2>
    <textarea id="discordPaste" placeholder=":fried_egg:[샌드위치] | 140 → 138&#10;샌드위치 138"></textarea>
    <div class="paste-actions">
      <button id="applyDiscordBtn" class="primary-btn">변경가 적용</button>
      <button id="resetDiscordBtn" class="secondary-btn">전체 초기화</button>
    </div>
    <div id="discordApplyNotice" class="discord-apply-notice"></div>
    <div id="updateSummary" class="update-summary"></div>
  </div>

  <div class="card">
    <h2>결과 필터</h2>
    <div class="toolbar" id="filterBar"></div>
  </div>

  <div class="card">
    <h2>손익 결과</h2>
    <div id="mobileResults" class="mobile-results"></div>
  </div>

  <div class="card hidden-front" id="detailRecipeSection">
    <h2>상세 레시피</h2>
    <div id="recipeGrid" class="recipe-grid"></div>
  </div>
</div>

  {key:'mussel_pasta', tier:'4차', name:'홍합 파스타', max:149, detail:[['홍합 x 2', p=>p.mussel*2], ['당근 상자 x 1', p=>p.carrotpotatobox], ['가공 치즈 x 1', p=>p.procCheese]]}

function unitLabel(unit){
  return ({item:'1개', stack:'1세트', shulker:'1셜커', box:'1상자', boxstack:'상자 1세트'})[unit] || unit;
}
function unitSize(unit){
  if(unit==='stack') return STACK;
  if(unit==='shulker') return SHULKER;
  if(unit==='box') return BOX;
  if(unit==='boxstack') return BOX_STACK;
  return 1;
}
function num(v){ const n = parseFloat(v); return Number.isFinite(n) ? n : 0; }
function fmt1(v){ return num(v).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function fmt0(v){ return Math.round(num(v)).toLocaleString('ko-KR'); }
function fmtRatio(v){
  return (num(v)*100).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}
function shulkerValue(v){
  return num(v) * SHULKER;
}

function bonusRate(){ return num(document.getElementById('bonusRate').value); }
function withBonus(raw){ return raw / (1 + bonusRate()); }
function perUnit(id){
  const value = num(document.getElementById(id + '_value').value);
  const unit = document.getElementById(id + '_unit').value;
  return value / unitSize(unit);
}

function buildPriceGrid(){
  const html = PRICE_FIELDS.map(f => {

function normalizeName(name){
  return String(name || '')
    .replace(/:fried_egg:/g, '')
    .replace(/🍳/g, '')
    .replace(/[\[\]｜|]/g, ' ')
    .replace(/\([^)]*\)/g, ' ')
    .replace(/\d+(?:\.\d+)?\s*원?/g, ' ')
    .replace(/[→>\-]+/g, ' ')
    .replace(/^\s*소고기/, '')
    .replace(/^\s*퐁신/, '')
    .replace(/파스타$/, ' 파스타')
    .replace(/\s+/g,'')
    .trim();
}

function resolveRecipeByName(rawName){
  const map = recipeNameMap();
  const normalized = normalizeName(rawName);
  if(!normalized) return null;
  if(map[normalized]) return map[normalized];

  const exact = RECIPES.find(r => normalizeName(r.name) === normalized);
  if(exact) return exact;

  const partials = RECIPES.filter(r => {
    const recipeNorm = normalizeName(r.name);
    return recipeNorm.includes(normalized) || normalized.includes(recipeNorm);
  });

  if(partials.length === 1) return partials[0];

  const prefix = RECIPES.filter(r => normalizeName(r.name).startsWith(normalized));
  if(prefix.length === 1) return prefix[0];

  return null;
}

function normalizeDiscordDisplayText(text){
  return String(text || '').replace(/:fried_egg:/g, '🍳');
}

function parseDiscordUpdates(text){
  const lines = String(text || '').split(/\n+/).map(v => v.trim()).filter(Boolean);
  const updates = [];

  lines.forEach(line => {
    let rawName = '';
    let oldValue = null;
    let newValue = null;

    const arrowMatch = line.match(/(?:🍳\s*)?(?:\[(.+?)\]|([^|]+?))\s*\|?\s*(-?\d+(?:\.\d+)?)\s*[→>\-]+\s*(-?\d+(?:\.\d+)?)/);
    if(arrowMatch){
      rawName = (arrowMatch[1] || arrowMatch[2] || '').trim();
      oldValue = num(arrowMatch[3]);
      newValue = num(arrowMatch[4]);
    } else {
      const simpleMatch = line.match(/(?:🍳\s*)?(?:\[(.+?)\]|(.+?))\s+(-?\d+(?:\.\d+)?)(?:\s*원)?$/);
      if(!simpleMatch) return;
      rawName = (simpleMatch[1] || simpleMatch[2] || '').trim();
      newValue = num(simpleMatch[3]);
    }

    const recipe = resolveRecipeByName(rawName);
    if(!recipe || !Number.isFinite(newValue)) return;
    updates.push({
      key: recipe.key,
      name: recipe.name,
      rawName,
      oldValue,
      newValue,
      max: recipe.max,
      diffFromMax: newValue - recipe.max
    });
  });

  const deduped = [];
  const seen = new Set();
  updates.reverse().forEach(item => {
    if(seen.has(item.key)) return;
    seen.add(item.key);
    deduped.push(item);
  });
  return deduped.reverse();
}

function getStoredDiscordUpdates(){
  try{
    const raw = localStorage.getItem(DISCORD_UPDATES_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}

function getDiscordApplyNotice(updates){
  const safeUpdates = Array.isArray(updates) ? updates : [];
  if(!safeUpdates.length){
    return {
      appliedLine: '',
      missingLine: '아직 적용된 변경가가 없습니다.'
    };
  }

  const appliedLine = `${safeUpdates.length}개 요리 가격을 반영했습니다.`;
  const updatedKeys = new Set(safeUpdates.map(u => u.key));
  const missingNames = RECIPES.filter(r => !updatedKeys.has(r.key)).map(r => r.name);

  if(!missingNames.length){
    return { appliedLine, missingLine: '모든 요리가 입력되었습니다.' };
  }

  if(missingNames.length <= 3){
    return {
      appliedLine,
      missingLine: `${missingNames.join(', ')} 요리가 입력되지 않았습니다.`
    };
  }

  return {
    appliedLine,
    missingLine: `${missingNames.length}개의 요리가 입력되지 않았습니다.`
  };
}

function renderDiscordApplyNotice(updates = getStoredDiscordUpdates()){
  const box = document.getElementById('discordApplyNotice');
  if(!box) return;

  const notice = getDiscordApplyNotice(updates);
  const lines = [];

  if(notice.appliedLine){
    lines.push(`<div class="discord-apply-line main">${notice.appliedLine}</div>`);
  }

  const subClass = notice.appliedLine ? 'sub' : 'empty';
  lines.push(`<div class="discord-apply-line ${subClass}">${notice.missingLine}</div>`);

  box.innerHTML = lines.join('');
}

function renderUpdateSummary(){
  const box = document.getElementById('updateSummary');
  if(!box) return;
  const updates = getStoredDiscordUpdates();
  if(!updates.length){
    box.innerHTML = '<div class="update-empty">아직 적용된 변경가가 없습니다.</div>';
    return;
  }

  const resultMap = Object.fromEntries(buildAllData().map(r => [r.key, r]));
  const visible = updates
    .map(u => ({...u, bucket: u.diffFromMax >= 0 ? 'max' : Math.abs(Math.round(u.diffFromMax)), result: resultMap[u.key]}))
    .filter(u => u.bucket === 'max' || (Number.isInteger(u.bucket) && u.bucket >= 1 && u.bucket <= 4))
    .sort((a,b) => {
      if(a.diffFromMax !== b.diffFromMax) return b.diffFromMax - a.diffFromMax;
      if(a.newValue !== b.newValue) return b.newValue - a.newValue;
      const aprofit = a.result?.profit ?? -Infinity;
      const bprofit = b.result?.profit ?? -Infinity;
      if(aprofit !== bprofit) return bprofit - aprofit;
      return a.name.localeCompare(b.name, 'ko');
    });

  if(!visible.length){
    box.innerHTML = '<div class="update-empty">표시할 음식이 없습니다.</div>';
    return;
  }

  box.innerHTML = `
    <div class="update-header">
      <div class="update-header-spacer"></div>
      <div class="update-header-label">손익</div>
      <div class="update-header-label">1셜커 이익</div>
      <div class="update-header-label">이율</div>
    </div>
    <div class="update-list">
      ${visible.map(item => {
        const result = item.result;
        const totalProfitText = result
          ? `${result.profit >= 0 ? '+' : ''}${fmt0(result.profit)}`
          : '-';
        const shulkerProfitText = result
          ? `${result.profit >= 0 ? '+' : ''}${fmt0(shulkerValue(result.profit))}`
          : '-';
        const roiText = result
          ? `${result.roi >= 0 ? '+' : ''}${(result.roi*100).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})}%`
          : '-';
        const diffClass = item.bucket === 'max' ? 'max' : 'minus';
        const rowClass = item.bucket === 'max' ? 'max' : `m${item.bucket}`;
        const diffText = item.bucket === 'max' ? '최고가' : `(-${item.bucket})`;
        return `
          <div class="update-item ${rowClass}">
            <div class="update-main">
              <span class="update-name">[${item.name}]</span>
              <span class="update-price">${fmt0(item.newValue)}원</span>
              <span class="update-diff ${diffClass}">${diffText}</span>
            </div>
            <div class="update-metric"><span class="update-value ${result && result.profit >= 0 ? 'plus' : 'minus'}">${totalProfitText}</span></div>
            <div class="update-metric"><span class="update-value ${result && result.profit >= 0 ? 'plus' : 'minus'}">${shulkerProfitText}</span></div>
            <div class="update-metric"><span class="update-value ${result && result.roi >= 0 ? 'plus' : 'minus'}">${roiText}</span></div>
            <div class="update-mobile-stats">
              <div class="update-mobile-col"><span class="update-mobile-label">손익</span><span class="update-mobile-value ${result && result.profit >= 0 ? 'plus' : 'minus'}">${totalProfitText}</span></div>
              <div class="update-mobile-col"><span class="update-mobile-label">1셜커 이익</span><span class="update-mobile-value ${result && result.profit >= 0 ? 'plus' : 'minus'}">${shulkerProfitText}</span></div>
              <div class="update-mobile-col"><span class="update-mobile-label">이율</span><span class="update-mobile-value ${result && result.roi >= 0 ? 'plus' : 'minus'}">${roiText}</span></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function applyDiscordTextToSales(text){
  const updates = parseDiscordUpdates(text);
  const saleMap = {};

  RECIPES.forEach(r => {
    saleMap[r.key] = r.max;
  });

  updates.forEach(u => {
    saleMap[u.key] = u.newValue;
  });

  saleState = {...saleMap};

  const displayText = normalizeDiscordDisplayText(text);
  const textarea = document.getElementById('discordPaste');
  if(textarea) textarea.value = displayText;
  localStorage.setItem(DISCORD_TEXT_KEY, displayText || '');
  localStorage.setItem(DISCORD_UPDATES_KEY, JSON.stringify(updates));
  render();
  renderDiscordApplyNotice(updates);
}

function resetDiscordPricing(){
  const textarea = document.getElementById('discordPaste');
  if(textarea) textarea.value = '';
  localStorage.removeItem(DISCORD_TEXT_KEY);
  localStorage.removeItem(DISCORD_UPDATES_KEY);
  saleState = {};
  RECIPES.forEach(r => {
    saleState[r.key] = r.max;
  });
  render();
  renderDiscordApplyNotice([]);
}

function buildAllData(){
  const p = getPrices();
  return RECIPES.map(r => {
    const detail = r.detail.map(([name, fn]) => [name, fn(p)]);
    const raw = detail.reduce((a,b)=>a+b[1],0);
    const cost = withBonus(raw);
    const sale = saleState[r.key] !== undefined ? num(saleState[r.key]) : r.max;
    const profit = sale - cost;
    const roi = cost > 0 ? (profit / cost) : (sale > 0 ? 1 : 0);
    const detailRatio = raw > 0
      ? detail.map(([name, value]) => [name, value, value / raw])
      : detail.map(([name, value]) => [name, value, 0]);
    return {...r, detail, detailRatio, raw, cost, sale, profit, roi};
  }).sort((a,b)=>b.profit - a.profit);
}

function buildData(){
  return buildAllData().filter(r => currentFilter === '전체' || r.tier === currentFilter);
}

}

function attachSaleEvents(){
  RECIPES.forEach(r => {
    const el = document.getElementById(saleInputId(r.key));
    if(!el) return;
    if(el.dataset.bound) return;
    el.dataset.bound = '1';

    INPUT_IDS.push(saleInputId(r.key));

    // 입력 중에는 저장만 하고 재렌더 안 함
    el.addEventListener('input', () => {
      saleState[r.key] = num(el.value);
      saveState();
    });

    // 포커스가 빠질 때 반영
    el.addEventListener('blur', () => {
      saleState[r.key] = num(el.value);
      saveState();
      render();
    });

    // 엔터 눌렀을 때 반영
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        el.blur();
      }
    });
  });
}


function attachDetailEvents(){
  document.querySelectorAll('[data-detail-key]').forEach(btn => {
    if(btn.dataset.bound) return;
    btn.dataset.bound = '1';

    btn.addEventListener('click', () => {
      const key = btn.dataset.detailKey;
      openedDetailKey = (openedDetailKey === key) ? null : key;
      render();

  });

function applyDefaults(){
  document.getElementById('bonusRate').value = '0';
  currentFilter = '전체';
  PRICE_FIELDS.forEach(f => {
    const valueEl = document.getElementById(f.id + '_value');
    const unitEl = document.getElementById(f.id + '_unit');
    if(valueEl) valueEl.value = '';
    if(unitEl) unitEl.value = f.units[0];
  });
}

function saveState(){
  const state = {currentFilter, openedDetailKey};
  const bonus = document.getElementById('bonusRate');
  if(bonus) state.bonusRate = bonus.value;
  PRICE_FIELDS.forEach(f => {
    const v = document.getElementById(f.id + '_value');
    const u = document.getElementById(f.id + '_unit');
    if(v) state[f.id + '_value'] = v.value;
    if(u) state[f.id + '_unit'] = u.value;
  });
  RECIPES.forEach(r => {
    state[saleInputId(r.key)] = saleState[r.key] !== undefined ? saleState[r.key] : r.max;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState(){
  applyDefaults();
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const state = JSON.parse(raw);
    if(state.bonusRate !== undefined) document.getElementById('bonusRate').value = state.bonusRate;
    if(state.currentFilter) currentFilter = state.currentFilter;
    if(state.openedDetailKey !== undefined) openedDetailKey = state.openedDetailKey;
    PRICE_FIELDS.forEach(f => {
      const v = document.getElementById(f.id + '_value');
      const u = document.getElementById(f.id + '_unit');
      if(v && state[f.id + '_value'] !== undefined) v.value = state[f.id + '_value'];
      if(u && state[f.id + '_unit'] !== undefined) u.value = state[f.id + '_unit'];
    });
    const discordPaste = document.getElementById('discordPaste');
    if(discordPaste) discordPaste.value = normalizeDiscordDisplayText(localStorage.getItem(DISCORD_TEXT_KEY) || '');
    window.__saleState = state;
  }catch(e){ window.__saleState = {}; }
}

function hydrateSaleDefaults(){
  saleState = {};
  RECIPES.forEach(r => {
    const saved = window.__saleState?.[saleInputId(r.key)];
    saleState[r.key] = saved !== undefined ? num(saved) : r.max;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildPriceGrid();
  buildFilterBar();
  loadState();
  document.getElementById('bonusRate').addEventListener('input', render);
  document.getElementById('bonusRate').addEventListener('change', render);
  PRICE_FIELDS.forEach(f => {
    document.getElementById(f.id + '_value').addEventListener('input', render);
    document.getElementById(f.id + '_unit').addEventListener('change', render);
  });
  const discordPasteEl = document.getElementById('discordPaste');
  discordPasteEl.addEventListener('input', () => {
    const normalized = normalizeDiscordDisplayText(discordPasteEl.value);
    if(normalized !== discordPasteEl.value){
      const start = discordPasteEl.selectionStart;
      const end = discordPasteEl.selectionEnd;
      discordPasteEl.value = normalized;
      try{ discordPasteEl.setSelectionRange(start, end); }catch(e){}
    }
  });
  discordPasteEl.addEventListener('paste', () => {
    requestAnimationFrame(() => {
      const normalized = normalizeDiscordDisplayText(discordPasteEl.value);
      if(normalized !== discordPasteEl.value) discordPasteEl.value = normalized;
    });
  });
  document.getElementById('applyDiscordBtn').addEventListener('click', () => {
    applyDiscordTextToSales(discordPasteEl.value);
  });
  document.getElementById('resetDiscordBtn').addEventListener('click', resetDiscordPricing);
  render();
  hydrateSaleDefaults();
  const savedDiscordText = localStorage.getItem(DISCORD_TEXT_KEY);
  if(savedDiscordText){
    applyDiscordTextToSales(savedDiscordText);
  } else {
    renderUpdateSummary();
    renderDiscordApplyNotice([]);
  }
  render();
  buildFilterBar();
});
</script>
</body>
</html>
