<!DOCTYPE html>

<head>

</svg>' />

<style>
:root{
--bg:#1e1e1e;
--panel:#252526;
--text:#d4d4d4;
--muted:#858585;
--accent:#0e639c;
}

*{
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:Segoe UI, Arial;
margin:0;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px 14px;
}

.container{
background:var(--panel);
padding:50px 60px;

border-radius:14px;

box-shadow:0 0 20px rgba(0,0,0,0.4);

text-align:center;
width:100%;
max-width:420px;
}

h1{
margin:0;
font-size:28px;
}

.byline{
font-size:14px;
color:#569cd6;
font-weight:600;
margin-top:8px;
margin-bottom:34px;
letter-spacing:0.3px;
}

.btn{
display:block;

width:280px;
max-width:100%;

margin:18px auto;
padding:16px;

background:var(--accent);
color:white;

text-decoration:none;

border-radius:10px;

font-size:18px;
font-weight:600;

transition:0.15s;
}

.btn:hover{
background:#1177bb;
transform:translateY(-1px);
}

.footer{
margin-top:30px;
font-size:13px;
color:var(--muted);
}

@media (max-width: 640px){
body{
align-items:flex-start;
padding:18px 12px;
}

.container{
padding:26px 16px;
border-radius:12px;
max-width:100%;
}

h1{
margin:0;
font-size:24px;
}

.byline{
font-size:13px;
margin-top:8px;
margin-bottom:24px;
}

.btn{
width:100%;
margin:12px auto;
padding:15px 14px;
font-size:17px;
border-radius:10px;
}

.footer{
margin-top:20px;
font-size:12px;
}
}
</style>
</head>
