<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동글랜드 계산기</title>

<style>

:root{
--bg:#1e1e1e;
--panel:#252526;
--text:#d4d4d4;
--muted:#858585;
--accent:#0e639c;
}

body{
background:var(--bg);
color:var(--text);
font-family:Segoe UI, Arial;
margin:0;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
}

.container{
background:var(--panel);
padding:50px 60px;

border-radius:14px;

box-shadow:0 0 20px rgba(0,0,0,0.4);

text-align:center;
}

h1{
margin-top:0;
margin-bottom:40px;
font-size:28px;
}

.btn{
display:block;

width:280px;

margin:18px auto;
padding:16px;

background:var(--accent);
color:white;

text-decoration:none;

border-radius:10px;

font-size:18px;
font-weight:600;

transition:0.15s;
}

.btn:hover{
background:#1177bb;
transform:translateY(-1px);
}

.footer{
margin-top:30px;
font-size:13px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<h1>동글랜드 계산기</h1>

<a class="btn" href="enhance.html">
강화 계산기
</a>

<a class="btn" href="alchemy.html">
연금 계산기
</a>

<div class="footer">
Dongle Land Tools
</div>

</div>

</body>
</html>
