<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>마동석 계산기</title>
  <style>
    :root{
      --bg:#1e1e1e; --panel:#252526; --border:#333; --border2:#3a3a3a; --text:#d4d4d4;
      --muted:#9aa0a6; --blue:#569cd6; --cyan:#9cdcfe; --num:#b5cea8; --warn:#dcdcaa;
      --bad:#f14c4c; --good:#4ec9b0; --money:#ce9178; --shadow:0 10px 28px rgba(0,0,0,.22);
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Consolas, monospace;padding:18px 12px 30px;display:flex;justify-content:center}
    .container{width:100%;max-width:780px}
    h1{text-align:center;color:var(--blue);margin:0 0 14px;font-size:24px}
    h2{margin:0 0 12px;color:var(--blue);font-size:18px}
    .sub{color:var(--muted);text-align:center;margin:0 0 12px;font-size:13px;line-height:1.45}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
    .form{display:flex;flex-direction:column;gap:10px}
    .field{display:flex;align-items:center;gap:12px;width:100%}
    label{color:var(--cyan);flex:0 0 220px;white-space:nowrap;line-height:1.15}
    .controlRow{display:flex;align-items:center;gap:10px;flex:1 1 auto;min-width:0;justify-content:flex-end}
    input[type="number"], input[type="text"]{background:#1e1e1e;color:var(--text);border:1px solid var(--border2);padding:8px 10px;border-radius:10px;outline:none;height:36px;font-size:14px;min-width:0;flex:1 1 auto;width:100%}
    .controlRow input[type="number"]{flex:0 1 180px;min-width:120px}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(86,156,214,.18)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:#1f1f1f;border:1px solid var(--border2);border-radius:10px;padding:12px;margin-top:10px}
    .rows{display:grid;grid-template-columns:1fr auto;gap:8px 12px;align-items:center}
    .key{color:var(--muted)} .val{color:var(--num);font-weight:700;text-align:right}
    .money{color:var(--money);font-weight:700} .good{color:var(--good);font-weight:700}
    .bad{color:var(--bad);font-weight:700} .warn{color:var(--warn);font-weight:700}
    .small{font-size:12px;color:var(--muted)}
    .footerRow{display:flex;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap}
    a.linkBtn, button{background:#0e639c;color:#fff;border:none;text-decoration:none;padding:12px 16px;cursor:pointer;border-radius:12px;font-weight:900;font-size:15px}
    button:hover, a.linkBtn:hover{background:#1177bb}
    .unitToggle{display:inline-flex;align-items:center;gap:8px;background:#1e1e1e;border:1px solid var(--border2);padding:4px;border-radius:999px;min-width:110px;justify-content:space-between}
    .toggleTrack{position:relative;width:58px;height:28px;border-radius:999px;background:#111;border:1px solid var(--border2);cursor:pointer;flex:0 0 auto}
    .toggleThumb{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--blue);transition:left .18s ease}
    .toggleTrack.set .toggleThumb{left:32px}
    .toggleLabel{font-size:12px;color:var(--muted);width:24px;text-align:center;user-select:none}
    @media (max-width:700px){
      .grid2{grid-template-columns:1fr}
      .field{flex-direction:column;align-items:stretch;gap:6px}
      label{flex:0 0 auto;white-space:normal}
      .controlRow{justify-content:stretch}
      .controlRow input[type="number"]{flex:1 1 auto;min-width:0}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>마동석 계산기</h1>
    
    <div class="grid2">
      <div class="panel">
        <h2>① 마동석 수량 기준</h2>
        <div class="form">
          <div class="field">
            <label>마동석 가격</label>
            <div class="controlRow"><input type="text" id="madongPrice1" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>토파즈 가격</label>
            <div class="controlRow"><input type="text" id="topazPrice1" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>다이아 블럭 1세트 가격</label>
            <div class="controlRow"><input type="text" id="diamondSetPrice1" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>마동석 수량</label>
            <div class="controlRow">
              <div class="unitToggle">
                <span class="toggleLabel">개수</span>
                <div class="toggleTrack" data-target="buyQtyMode"><div class="toggleThumb"></div></div>
                <span class="toggleLabel">세트</span>
              </div>
              <input type="number" id="buyQty" min="0" step="1" value="1">
            </div>
          </div>
        </div>
        <div id="buyResult"></div>
      </div>

      <div class="panel">
        <h2>② 토파즈 목표 기준</h2>
        <div class="form">
          <div class="field">
            <label>마동석 가격</label>
            <div class="controlRow"><input type="text" id="madongPrice2" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>토파즈 가격</label>
            <div class="controlRow"><input type="text" id="topazPrice2" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>다이아 블럭 1세트 가격</label>
            <div class="controlRow"><input type="text" id="diamondSetPrice2" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label>필요한 토파즈</label>
            <div class="controlRow">
              <div class="unitToggle">
                <span class="toggleLabel">개수</span>
                <div class="toggleTrack" data-target="topazMode"><div class="toggleThumb"></div></div>
                <span class="toggleLabel">세트</span>
              </div>
              <input type="number" id="targetTopaz" min="0" step="1" value="1">
            </div>
          </div>
        </div>
        <div id="topazResult"></div>
      </div>
    </div>

    <div class="panel">
      <h2>③ 다이아 블럭 세트 목표 기준</h2>
      <div class="form">
        <div class="field">
          <label>마동석 가격</label>
          <div class="controlRow"><input type="text" id="madongPrice3" inputmode="numeric"></div>
        </div>
        <div class="field">
          <label>토파즈 가격</label>
          <div class="controlRow"><input type="text" id="topazPrice3" inputmode="numeric"></div>
        </div>
        <div class="field">
          <label>다이아 블럭 1세트 가격</label>
          <div class="controlRow"><input type="text" id="diamondSetPrice3" inputmode="numeric"></div>
        </div>
        <div class="field">
          <label>필요한 다이아 블럭 세트</label>
          <div class="controlRow"><input type="number" id="targetDiamondSet" min="0" step="1" value="1"></div>
        </div>
      </div>
      <div id="diamondResult"></div>
    </div>

    <div class="footerRow">
      <a class="linkBtn" href="index.html">메인으로</a>
      <div class="small">By 그팅</div>
    </div>
  </div>

<script>
const TOPAZ_EV = 0.5;
const KEYS_EV = (0.4*1.5) + (0.4*1.5) + (0.5*1.0) + (0.6*0.5); // 2.0
const DIAMOND_PER_KEY = 32.5;
const DIAMOND_EV = KEYS_EV * DIAMOND_PER_KEY; // 65
const DIAMOND_BLOCK_EV = DIAMOND_EV / 9;
const DIAMOND_SET_EV = DIAMOND_BLOCK_EV / 64;
const PER_SET_COUNT = 64;

const modes = { buyQtyMode:'count', topazMode:'count' };

function parseMoney(id){
  const el = document.getElementById(id);
  const raw = (el.value || '').replace(/,/g,'').trim();
  if(raw === '') return 0;
  const n = parseFloat(raw);
  return Number.isFinite(n) ? n : 0;
}
function formatComma(n){
  if(!Number.isFinite(n)) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}
function formatNum(n, digits=1){
  if(!Number.isFinite(n)) return '0.0';
  return n.toLocaleString('ko-KR', {maximumFractionDigits:digits, minimumFractionDigits:digits});
}
function moneySpan(n){
  const cls = n > 0 ? 'good' : (n < 0 ? 'bad' : 'warn');
  const sign = n > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${formatComma(n)}</span>`;
}
function wireMoney(id){
  const el = document.getElementById(id);
  el.addEventListener('input', ()=>{
    const raw = (el.value || '').replace(/,/g,'').replace(/[^0-9]/g,'');
    el.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    updateAll();
  });
}
function row(k,v){ return `<div class="key">${k}</div><div class="val">${v}</div>`; }
function renderCard(title, rows){
  return `<div class="card"><div style="color:var(--blue);font-weight:800;margin-bottom:10px;">${title}</div><div class="rows">${rows.join('')}</div></div>`;
}
function getInputValue(id, modeKey){
  const n = Math.max(0, parseFloat(document.getElementById(id).value) || 0);
  return modes[modeKey] === 'set' ? n * PER_SET_COUNT : n;
}
function syncPrice(prefix){
  const ids = ['madongPrice1','madongPrice2','madongPrice3','topazPrice1','topazPrice2','topazPrice3','diamondSetPrice1','diamondSetPrice2','diamondSetPrice3'];
  const source = document.getElementById(prefix);
  const val = source.value;
  ids.forEach(id=>{
    const kind = id.replace(/[123]/g,'');
    const sourceKind = prefix.replace(/[123]/g,'');
    if(kind === sourceKind && id !== prefix) document.getElementById(id).value = val;
  });
}
function setupSync(id){
  const el = document.getElementById(id);
  el.addEventListener('input', ()=>{ syncPrice(id); updateAll(); });
}
function setToggleVisual(track, mode){
  track.classList.toggle('set', mode === 'set');
}
function setupToggle(){
  document.querySelectorAll('.toggleTrack').forEach(track=>{
    const target = track.dataset.target;
    setToggleVisual(track, modes[target]);
    track.addEventListener('click', ()=>{
      modes[target] = modes[target] === 'count' ? 'set' : 'count';
      setToggleVisual(track, modes[target]);
      updateAll();
    });
  });
}

function calcBuy(){
  const qty = getInputValue('buyQty', 'buyQtyMode');
  const madongPrice = parseMoney('madongPrice1');
  const topazPrice = parseMoney('topazPrice1');
  const diamondSetPrice = parseMoney('diamondSetPrice1');

  const topaz = qty * TOPAZ_EV;
  const diamonds = qty * DIAMOND_EV;
  const dSets = qty * DIAMOND_SET_EV;
  const cost = qty * madongPrice;
  const diamondValue = dSets * diamondSetPrice;
  const topazValue = topaz * topazPrice;
  const totalValue = diamondValue + topazValue;
  const profit = totalValue - cost;
  const breakeven = (TOPAZ_EV * topazPrice) + (DIAMOND_SET_EV * diamondSetPrice);

  document.getElementById('buyResult').innerHTML =
    renderCard('기대 수량', [
      row('기대 토파즈', `${formatNum(topaz)}개`),
      row('기대 다이아', `${formatNum(diamonds)}개`),
      row('기대 다이아 블럭 세트', `${formatNum(dSets)}세트`),
    ]) +
    renderCard('기대 금액', [
      row('총 구매 비용', `<span class="money">${formatComma(cost)}</span>`),
      row('토파즈 기대값', `<span class="money">${formatComma(topazValue)}</span>`),
      row('다이아 기대값', `<span class="money">${formatComma(diamondValue)}</span>`),
      row('총 기대값', `<span class="money">${formatComma(totalValue)}</span>`),
      row('기대 손익', moneySpan(profit)),
      row('손익분기 마동석 개당가', `<span class="warn">${formatComma(breakeven)}</span>`),
    ]);
}

function calcTopaz(){
  const target = getInputValue('targetTopaz', 'topazMode');
  const madongPrice = parseMoney('madongPrice2');
  const topazPrice = parseMoney('topazPrice2');
  const diamondSetPrice = parseMoney('diamondSetPrice2');

  const needExact = target / TOPAZ_EV;
  const needBuy = Math.ceil(needExact);
  const byDiamondSets = needBuy * DIAMOND_SET_EV;
  const byDiamondValue = byDiamondSets * diamondSetPrice;
  const madongCost = needBuy * madongPrice;
  const directTopazCost = target * topazPrice;
  const breakEvenTopazPrice = target > 0 ? ((madongCost - byDiamondValue) / target) : 0;
  const breakEvenMadongPrice = needBuy > 0 ? ((directTopazCost + byDiamondValue) / needBuy) : 0;

  document.getElementById('topazResult').innerHTML =
    renderCard('필요 수량', [
      row('필요 마동석', `${formatComma(needBuy)}개`),
      row('같이 나오는 다이아 블럭 세트', `${formatNum(byDiamondSets)}세트`),
    ]) +
    renderCard('비교 금액', [
      row('마동석 구매 총액', `<span class="money">${formatComma(madongCost)}</span>`),
      row('부산물 다이아 기대값', `<span class="money">${formatComma(byDiamondValue)}</span>`),
      row('토파즈 직접 구매 총액', `<span class="money">${formatComma(directTopazCost)}</span>`),
      row('토파즈 직접구매 기준가', `<span class="warn">${formatComma(breakEvenTopazPrice)}</span>`),
      row('마동석 손익분기 개당가', `<span class="warn">${formatComma(breakEvenMadongPrice)}</span>`),
    ]);
}

function calcDiamond(){
  const targetSet = Math.max(0, parseFloat(document.getElementById('targetDiamondSet').value) || 0);
  const madongPrice = parseMoney('madongPrice3');
  const topazPrice = parseMoney('topazPrice3');
  const diamondSetPrice = parseMoney('diamondSetPrice3');

  const needExact = targetSet / DIAMOND_SET_EV;
  const needBuy = Math.ceil(needExact);
  const byTopaz = needBuy * TOPAZ_EV;
  const byTopazValue = byTopaz * topazPrice;
  const madongCost = needBuy * madongPrice;
  const directDiamondCost = targetSet * diamondSetPrice;
  const breakEvenMadongPrice = needBuy > 0 ? ((directDiamondCost + byTopazValue) / needBuy) : 0;
  const breakEvenDiamondSetPrice = targetSet > 0 ? ((madongCost - byTopazValue) / targetSet) : 0;

  document.getElementById('diamondResult').innerHTML =
    renderCard('필요 수량', [
      row('필요 마동석', `${formatComma(needBuy)}개`),
      row('같이 나오는 토파즈', `${formatNum(byTopaz)}개`),
    ]) +
    renderCard('비교 금액', [
      row('마동석 구매 총액', `<span class="money">${formatComma(madongCost)}</span>`),
      row('토파즈 기대값', `<span class="money">${formatComma(byTopazValue)}</span>`),
      row('다이아 직접 구매 총액', `<span class="money">${formatComma(directDiamondCost)}</span>`),
      row('다이아 직접구매 기준가', `<span class="warn">${formatComma(breakEvenDiamondSetPrice)}</span>`),
      row('마동석 손익분기 개당가', `<span class="warn">${formatComma(breakEvenMadongPrice)}</span>`),
    ]);
}

function updateAll(){ calcBuy(); calcTopaz(); calcDiamond(); }

['madongPrice1','madongPrice2','madongPrice3','topazPrice1','topazPrice2','topazPrice3','diamondSetPrice1','diamondSetPrice2','diamondSetPrice3'].forEach(id=>{
  wireMoney(id); setupSync(id);
});
['buyQty','targetTopaz','targetDiamondSet'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('input', updateAll);
  el.addEventListener('change', updateAll);
});
setupToggle();


const STORAGE_KEY = "madong_calc_v1";

function saveState(){
  const data = {};
  document.querySelectorAll("input").forEach(el=>{
    data[el.id] = el.value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    Object.keys(data).forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value = data[id];
    });
  }catch{}
}

document.querySelectorAll("input").forEach(el=>{
  el.addEventListener("input", saveState);
});

loadState();
updateAll();

</script>
</body>
</html>
